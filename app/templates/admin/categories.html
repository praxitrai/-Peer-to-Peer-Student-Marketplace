{% extends "admin/_layout.html" %}
{% block title %}Manage Categories{% endblock %}
{% block admin_content %}
<h3 class="mb-3">Manage Categories</h3>

<form method="POST" class="d-flex mb-4" style="max-width:400px;">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <input type="text" name="name" class="form-control me-2" placeholder="New category name" required>
  <button type="submit" class="btn btn-primary">Add</button>
</form>

<table class="table align-middle">
  <thead><tr><th>Name</th><th># Listings</th><th>Actions</th></tr></thead>
  <tbody>
    {% for c in categories %}
    <tr>
      <td>{{ c.name }}</td>
      <td>{{ c.listings|length }}</td>
      <td>
        <form method="POST" action="{{ url_for('admin.delete_category', category_id=c.id) }}" class="d-inline"
              onsubmit="return confirm('Delete this category?');">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button class="btn btn-sm btn-outline-danger">Delete</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
