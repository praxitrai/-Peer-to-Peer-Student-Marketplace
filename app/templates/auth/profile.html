{% extends "base.html" %}
{% block title %}My Account{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h3 class="mb-3">My Account</h3>

    <div class="card mb-4">
      <div class="card-body">
        <h5 class="card-title">Profile Details</h5>
        <form method="POST" action="{{ url_for('auth.profile') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" value="{{ current_user.email }}" disabled>
            <div class="form-text">Email cannot be changed.</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" name="full_name" class="form-control" value="{{ current_user.full_name }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Student ID</label>
            <input type="text" name="student_id" class="form-control" value="{{ current_user.student_id or '' }}">
          </div>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <h5 class="card-title">Change Password</h5>
        <form method="POST" action="{{ url_for('auth.change_password') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label">Current Password</label>
            <input type="password" name="current_password" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" name="new_password" class="form-control" required minlength="8">
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm New Password</label>
            <input type="password" name="confirm_new_password" class="form-control" required minlength="8">
          </div>
          <button type="submit" class="btn btn-outline-primary">Change Password</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
