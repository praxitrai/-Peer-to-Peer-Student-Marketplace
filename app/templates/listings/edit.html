{% extends "base.html" %}
{% block title %}Edit Listing{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <h3 class="mb-3">Edit Listing</h3>
    <form method="POST" enctype="multipart/form-data">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label">Title</label>
        <input type="text" name="title" class="form-control" value="{{ listing.title }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="4" required>{{ listing.description }}</textarea>
      </div>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Price (रु)</label>
          <input type="number" step="0.01" min="0.01" name="price" class="form-control" value="{{ listing.price }}" required>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Category</label>
          <select name="category_id" class="form-select" required>
            {% for c in categories %}
            <option value="{{ c.id }}" {% if c.id == listing.category_id %}selected{% endif %}>{{ c.name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Replace Photo (optional)</label>
        <input type="file" name="image" id="imageInput" accept="image/*" class="form-control">
        <img id="imagePreview" class="img-thumbnail mt-2 d-none" style="max-height:200px;">
      </div>
      <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const imageInput = document.getElementById('imageInput');
  const preview = document.getElementById('imagePreview');
  imageInput.addEventListener('change', function () {
    const file = this.files[0];
    if (!file) { preview.classList.add('d-none'); return; }
    const reader = new FileReader();
    reader.onload = e => { preview.src = e.target.result; preview.classList.remove('d-none'); };
    reader.readAsDataURL(file);
  });
</script>
{% endblock %}
